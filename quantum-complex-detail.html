<!DOCTYPE html>
<html class="dark" dir="rtl" lang="he">
<head>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#137fec","background-dark":"#101922","surface":"#1a2530","border-dark":"#2d3a4b","alert-rose":"#f43f5e","success-green":"#10b981","warning-amber":"#f59e0b"},fontFamily:{"display":["Manrope","sans-serif"],"mono":["JetBrains Mono","monospace"]}}}}</script>
<style>
body{font-family:'Manrope',sans-serif;}
.glass-panel{background:rgba(26,37,48,0.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.05);}
.custom-scrollbar::-webkit-scrollbar{width:6px;}
.custom-scrollbar::-webkit-scrollbar-track{background:transparent;}
.custom-scrollbar::-webkit-scrollbar-thumb{background:#2d3a4b;border-radius:10px;}
tr.data-row:hover{background:rgba(255,255,255,0.04);}
</style>
</head>
<body class="bg-background-dark text-slate-200 min-h-screen flex">

<img src="quantum-logo.png" alt="QUANTUM" class="h-12 w-auto object-contain" style="filter:drop-shadow(0 0 8px rgba(19,127,236,0.4));"/>
<div><h1 class="text-xl font-extrabold tracking-tight text-white uppercase">QUANTUM</h1>
<p class="text-[10px] text-primary font-bold tracking-widest leading-none">UNIFIED ANALYTICS</p></div>
</div>
<nav class="flex-1 px-4 space-y-1 mt-2">
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all" href="quantum-dashboard.html"><span class="material-symbols-outlined">dashboard</span><span>לוח בקרה</span></a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all" href="quantum-opportunities.html"><span class="material-symbols-outlined">diamond</span><span>הזדמנויות</span></a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary text-white font-semibold" href="quantum-complexes.html"><span class="material-symbols-outlined">location_city</span><span>מתחמים</span></a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all" href="quantum-map-view.html"><span class="material-symbols-outlined">map</span><span>מפת פרויקטים</span></a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all" href="quantum-market-analysis.html"><span class="material-symbols-outlined">monitoring</span><span>ניתוח שוק</span></a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all" href="quantum-properties.html"><span class="material-symbols-outlined">apartment</span><span>נכסים</span></a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all" href="quantum-messaging.html"><span class="material-symbols-outlined">mail</span><span>הודעות</span></a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all" href="quantum-alerts.html"><span class="material-symbols-outlined">notifications</span><span>התראות</span><span id="nav-alert-badge" class="hidden mr-auto px-1.5 py-0.5 bg-alert-rose text-white text-[9px] font-bold rounded-full min-w-[18px] text-center"></span></a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all" href="quantum-scans.html"><span class="material-symbols-outlined">radar</span><span>סריקות</span></a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all" href="quantum-reports.html"><span class="material-symbols-outlined">description</span><span>דוחות</span></a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all" href="quantum-settings.html"><span class="material-symbols-outlined">settings</span><span>הגדרות</span></a>
</nav>
<div class="p-4 mt-auto">
<div class="flex items-center gap-3 px-2">
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center"><span class="material-symbols-outlined text-primary">person</span></div>
<div class="flex-1 min-w-0"><p class="text-sm font-bold text-white truncate">QUANTUM Admin</p><p class="text-xs text-slate-500 truncate"><span class="q-ver">v...</span></p></div>
</div>
</div>
</aside>
<!-- Main -->
<main class="flex-1 min-w-0 h-screen overflow-y-auto overflow-x-hidden flex flex-col">
<header class="flex items-center justify-between px-8 py-5 border-b border-white/5 glass-panel sticky top-0 z-10">
<div class="flex items-center gap-4">
<button onclick="history.back()" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm"><span class="material-symbols-outlined">arrow_forward</span><span>חזרה</span></button>
<div><h2 class="text-2xl font-bold text-white leading-tight" id="page-title">טוען...</h2>
<p class="text-sm text-slate-400" id="page-subtitle"></p></div>
</div>
<div id="iai-display" class="text-right"></div>
</header>
<div class="p-8 flex-1 custom-scrollbar overflow-y-auto" id="content">
<div class="text-center py-16 text-slate-500">טוען נתונים...</div>
</div>
</main>
<script>
const API='https://pinuy-binuy-analyzer-production.up.railway.app';
const STATUS_HE={declared:'הכרזה',planning:'תכנון',pre_deposit:'לפני הפקדה',deposited:'הופקד',approved:'אושר',permit:'היתר',construction:'בנייה'};
const STATUS_FLOW=['declared','planning','pre_deposit','deposited','approved','permit','construction'];
const IAI_COLORS={excellent:'#10b981',good:'#137fec',moderate:'#f59e0b',low:'#f43f5e'};
function iaiCat(s){return s>=70?'excellent':s>=50?'good':s>=30?'moderate':'low';}
function statusPill(s){const colors={declared:'#8b5cf6',planning:'#6366f1',pre_deposit:'#3b82f6',deposited:'#0ea5e9',approved:'#10b981',permit:'#22d3ee',construction:'#f59e0b'};const c=colors[s]||'#6b7280';return `<span style="background:${c}18;color:${c};border:1px solid ${c}30" class="px-2 py-0.5 rounded-md text-xs font-semibold">${STATUS_HE[s]||s}</span>`;}
function statusTimeline(current){const idx=STATUS_FLOW.indexOf(current);return `<div class="flex items-center gap-0 my-3">${STATUS_FLOW.map((s,i)=>{const active=i<=idx,isCurrent=i===idx;return `<div class="flex items-center"><div title="${STATUS_HE[s]||s}" style="width:${isCurrent?14:10}px;height:${isCurrent?14:10}px;border-radius:50%;background:${active?(isCurrent?'#10b981':'#10b98180'):'rgba(255,255,255,0.1)'};border:${isCurrent?'2px solid #10b981':'none'};box-shadow:${isCurrent?'0 0 8px rgba(16,185,129,0.4)':'none'}"></div>${i<STATUS_FLOW.length-1?`<div style="width:24px;height:2px;background:${i<idx?'#10b98160':'rgba(255,255,255,0.06)'}"></div>`:''}</div>`;}).join('')}</div>`;}
function fmtPrice(v){if(!v)return '-';return new Intl.NumberFormat('he-IL',{style:'currency',currency:'ILS',maximumFractionDigits:0}).format(v);}
async function loadComplex(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get('id');
  if(!id){document.getElementById('content').innerHTML='<div class="text-center py-16 text-alert-rose">מזהה מתחם חסר</div>';return;}
  try{
    const [r1,r2]=await Promise.all([fetch(`${API}/api/projects/${id}`),fetch(`${API}/api/projects/${id}/listings`)]);
    const d1=await r1.json();const d2=await r2.json();
    const p=d1.data||d1;
    const listings=d2.listings||d2.data||[];
    document.getElementById('page-title').textContent=p.name||'מתחם';
    document.getElementById('page-subtitle').textContent=`${p.city||''} | ${p.addresses||''}`;
    const iaiColor=IAI_COLORS[iaiCat(p.iai_score||0)];
    document.getElementById('iai-display').innerHTML=`<div class="text-xs text-slate-400 mb-1">ציון IAI</div><div style="color:${iaiColor}" class="text-4xl font-bold font-mono">${p.iai_score||0}</div>`;
    document.getElementById('content').innerHTML=`
      <div class="glass-panel rounded-2xl p-6 mb-6">
        <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">שלב הפרויקט</h3>
        ${statusTimeline(p.status)}
        <div class="mt-2">${statusPill(p.status)}</div>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
        ${[['יזם',p.developer||'-'],['יח"ד מתוכננות',(p.planned_units||'-').toLocaleString?.()??'-'],['יח"ד קיימות',(p.existing_units||'-').toLocaleString?.()??'-'],['פרמיה תיאורטית',p.theoretical_premium_min&&p.theoretical_premium_max?`${p.theoretical_premium_min}-${p.theoretical_premium_max}%`:'-'],['פרמיה בפועל',p.actual_premium?`${p.actual_premium}%`:'-'],['מודעות פעילות',p.active_listings||0]].map(([label,val])=>`
          <div class="glass-panel rounded-xl p-4">
            <div class="text-xs text-slate-500 mb-2">${label}</div>
            <div class="text-base font-semibold text-white">${val}</div>
          </div>`).join('')}
      </div>
      ${listings.length>0?`
      <div class="glass-panel rounded-2xl overflow-hidden">
        <div class="px-6 py-4 border-b border-white/5"><h3 class="font-semibold text-white">מודעות למכירה (${listings.length})</h3></div>
        <table class="w-full text-sm">
          <thead><tr class="border-b border-white/5">
            ${['כתובת','חדרים','מ"ר','מחיר','מחיר/מ"ר','מקור'].map(h=>`<th class="px-4 py-3 text-right text-xs text-slate-400 font-semibold uppercase tracking-wider">${h}</th>`).join('')}
          </tr></thead>
          <tbody>${listings.map(l=>`
            <tr class="data-row border-b border-white/5">
              <td class="px-4 py-3 text-white">${l.address||'-'}</td>
              <td class="px-4 py-3 text-slate-400">${l.rooms||'-'}</td>
              <td class="px-4 py-3 text-slate-400">${l.area_sqm||'-'}</td>
              <td class="px-4 py-3 font-semibold text-white">${fmtPrice(l.asking_price)}</td>
              <td class="px-4 py-3 text-slate-400">${l.price_per_sqm?fmtPrice(l.price_per_sqm):'-'}</td>
              <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-md text-xs font-bold bg-indigo-500/20 text-indigo-400 border border-indigo-500/30">${l.source||'yad2'}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`:``}
    `;
  }catch(e){document.getElementById('content').innerHTML=`<div class="text-center py-16 text-alert-rose">שגיאה בטעינת נתוני מתחם</div>`;}
}
loadComplex();
fetch(`${API}/api/alerts?limit=500`).then(r=>r.json()).then(d=>{const u=(d.alerts||[]).filter(a=>!a.is_read).length;const b=document.getElementById('nav-alert-badge');if(b&&u>0){b.textContent=u>99?'99+':u;b.classList.remove('hidden')}}).catch(()=>{});
fetch(`${API}/health`).then(r=>r.json()).then(d=>{document.querySelectorAll('.q-ver').forEach(el=>el.textContent='v'+d.version)}).catch(()=>{});
</script>
</body>
</html>
